name: Gold Price Alert

on:
  schedule:
    # 11:30 PM IST = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run gold tracker
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
          WA_PHONE:           ${{ secrets.WA_PHONE }}
          WA_APIKEY:          ${{ secrets.WA_APIKEY }}
          GOLD_API_KEY:       ${{ secrets.GOLD_API_KEY }}
        run: python gold_tracker.py

      - name: Save price for tomorrow
        run: |
          git config user.email "bot@github.com"
          git config user.name "Gold Bot"
          git add last_price.txt
          git diff --staged --quiet || git commit -m "Update price $(date)" && git push
